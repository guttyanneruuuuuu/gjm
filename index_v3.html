<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Inverse Hunter — 食物連鎖を逆走する3DアクションRPG</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%90%BA</text></svg>">
  <style>
    :root {
      --gold: #e7c878;
      --gold2: #c79b4a;
      --bg: #05080c;
      --ink: #e8e2d4;
      --green: #8fb09c;
      --red: #e07b7b;
      --blue: #86a0c0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Segoe UI", sans-serif;
      color: var(--ink);
    }

    #game {
      position: fixed;
      inset: 0;
      display: block;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hidden {
      display: none !important;
    }

    /* ========== Loading Screen ========== */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 40%, #16242f 0%, #05080c 75%);
      gap: 22px;
    }

    #loader.hidden {
      display: none;
    }

    #loader .l-title {
      font-size: clamp(24px, 5vw, 42px);
      letter-spacing: 0.2em;
      color: #f2e9d0;
      font-weight: 300;
      text-shadow: 0 0 26px #c79b4a99;
    }

    #loader .l-bar {
      width: min(60vw, 360px);
      height: 6px;
      background: #10171c;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #2a3a30;
    }

    #loader .l-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #c79b4a, #f0d98a);
      transition: width 0.2s;
    }

    #loader .l-tip {
      font-size: 12px;
      color: #7f9486;
      letter-spacing: 0.1em;
      max-width: 80%;
      text-align: center;
      line-height: 1.8;
    }

    /* ========== Title Screen ========== */
    #title {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 26%, #16242f 0%, #05080c 72%);
      text-align: center;
      padding: 20px;
      overflow-y: auto;
    }

    #title.hidden {
      display: none;
    }

    #title h1 {
      font-size: clamp(34px, 7vw, 76px);
      letter-spacing: 0.16em;
      color: #f2e9d0;
      text-shadow: 0 0 30px #c79b4a99;
      font-weight: 300;
    }

    #title .sub {
      margin-top: 10px;
      font-size: clamp(12px, 2.4vw, 18px);
      color: var(--green);
      letter-spacing: 0.22em;
    }

    #title .chain {
      margin-top: 24px;
      font-size: clamp(20px, 4.4vw, 36px);
      letter-spacing: 0.08em;
      filter: drop-shadow(0 0 8px #0008);
    }

    #title .tag {
      margin-top: 22px;
      font-size: clamp(11px, 2vw, 15px);
      color: #b7a98a;
      font-style: italic;
      max-width: 560px;
      line-height: 1.7;
      opacity: 0.85;
    }

    #startBtn, .menuBtn {
      margin-top: 14px;
      padding: 15px 50px;
      font-size: 17px;
      letter-spacing: 0.28em;
      color: #0a0d12;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 0 30px #c79b4a55;
      transition: transform 0.15s, box-shadow 0.2s;
      font-family: inherit;
    }

    #startBtn:hover, .menuBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 52px #c79b4a99;
    }

    #title .hint {
      margin-top: 26px;
      font-size: 12px;
      color: #6d7b72;
      letter-spacing: 0.06em;
      line-height: 1.9;
      max-width: 620px;
    }

    #title .hint b {
      color: #bcae8c;
      font-weight: 600;
    }

    /* ========== Game Over Screen ========== */
    #gameOverScreen {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 50%, #2a0c0c 0%, #05080c 75%);
      gap: 18px;
      text-align: center;
    }

    #gameOverScreen.show {
      display: flex;
    }

    #gameOverScreen h2 {
      font-size: clamp(36px, 8vw, 64px);
      letter-spacing: 0.12em;
      color: #ff6b6b;
      text-shadow: 0 0 40px #ff6b6b55;
    }

    #gameOverScreen p {
      font-size: clamp(14px, 3vw, 20px);
      color: #bcae8c;
      letter-spacing: 0.08em;
      max-width: 80%;
    }

    #gameOverScreen button {
      margin-top: 20px;
      padding: 12px 40px;
      font-size: 16px;
      letter-spacing: 0.2em;
      color: #0a0d12;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 30px #c79b4a55;
      transition: transform 0.15s, box-shadow 0.2s;
      font-family: inherit;
    }

    #gameOverScreen button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 52px #c79b4a99;
    }

    /* ========== Victory Screen ========== */
    #victoryScreen {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 50%, #0c2a0c 0%, #05080c 75%);
      gap: 18px;
      text-align: center;
    }

    #victoryScreen.show {
      display: flex;
    }

    #victoryScreen h2 {
      font-size: clamp(36px, 8vw, 64px);
      letter-spacing: 0.12em;
      color: #6bff6b;
      text-shadow: 0 0 40px #6bff6b55;
    }

    #victoryScreen p {
      font-size: clamp(14px, 3vw, 20px);
      color: #bcae8c;
      letter-spacing: 0.08em;
      max-width: 80%;
    }

    #victoryScreen button {
      margin-top: 20px;
      padding: 12px 40px;
      font-size: 16px;
      letter-spacing: 0.2em;
      color: #0a0d12;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 30px #c79b4a55;
      transition: transform 0.15s, box-shadow 0.2s;
      font-family: inherit;
    }

    #victoryScreen button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 52px #c79b4a99;
    }

    /* ========== Pause Screen ========== */
    #pauseScreen {
      position: fixed;
      inset: 0;
      z-index: 75;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5, 8, 12, 0.9);
      backdrop-filter: blur(8px);
      gap: 20px;
      text-align: center;
    }

    #pauseScreen.show {
      display: flex;
    }

    #pauseScreen h2 {
      font-size: 48px;
      letter-spacing: 0.15em;
      color: #f2e9d0;
      text-shadow: 0 0 30px #c79b4a99;
    }

    #pauseScreen p {
      font-size: 14px;
      color: #bcae8c;
      letter-spacing: 0.08em;
    }

    /* ========== Mobile Responsive ========== */
    @media (max-width: 768px) {
      #startBtn, .menuBtn {
        padding: 12px 30px;
        font-size: 14px;
      }

      #title .hint {
        font-size: 11px;
      }
    }

    @media (max-height: 600px) {
      #title {
        justify-content: flex-start;
        padding-top: 40px;
      }

      #title h1 {
        font-size: 32px;
      }

      #title .sub {
        font-size: 12px;
        margin-top: 6px;
      }

      #title .chain {
        font-size: 18px;
        margin-top: 12px;
      }

      #title .tag {
        font-size: 10px;
        margin-top: 12px;
      }

      #startBtn {
        margin-top: 8px;
        padding: 10px 30px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Loading Screen -->
  <div id="loader">
    <div class="l-title">INVERSE HUNTER</div>
    <div class="l-bar">
      <div class="l-fill"></div>
    </div>
    <div class="l-tip">食物連鎖を逆走する3DアクションRPG</div>
  </div>

  <!-- Title Screen -->
  <div id="title">
    <h1>INVERSE HUNTER</h1>
    <div class="sub">食物連鎖を逆走する</div>
    <div class="chain">🐭 → 🦊 → 🐍 → 🦅 → 🐺</div>
    <div class="tag">弱者が連鎖を昇り、やがて守る者になる</div>
    <button id="startBtn">START GAME</button>
    <div class="hint">
      <b>PC:</b> WASD/矢印キーで移動、マウスで視点操作、クリックで攻撃<br>
      <b>スマホ:</b> 左ジョイスティックで移動、右スワイプで視点操作、ボタンで攻撃
    </div>
  </div>

  <!-- Pause Screen -->
  <div id="pauseScreen">
    <h2>PAUSED</h2>
    <p>Press P to resume</p>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen">
    <h2>GAME OVER</h2>
    <p>You were defeated...</p>
    <button onclick="location.reload()">RESTART</button>
  </div>

  <!-- Victory Screen -->
  <div id="victoryScreen">
    <h2>VICTORY!</h2>
    <p>You conquered the food chain!</p>
    <button onclick="location.reload()">PLAY AGAIN</button>
  </div>

  <script type="module">
    // Hide loader and title after a short delay
    const loader = document.getElementById('loader');
    const title = document.getElementById('title');
    const startBtn = document.getElementById('startBtn');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const victoryScreen = document.getElementById('victoryScreen');
    const pauseScreen = document.getElementById('pauseScreen');

    // Start button handler
    startBtn.addEventListener('click', () => {
      title.classList.add('hidden');
      loader.classList.add('hidden');
      // Game will start automatically
    });

    // Hide loader initially
    setTimeout(() => {
      loader.classList.add('hidden');
    }, 2000);

    // Listen for game state changes
    window.addEventListener('engine:statechange', (e) => {
      const { newState } = e.detail;

      if (newState === 'gameOver') {
        gameOverScreen.classList.add('show');
      } else if (newState === 'victory') {
        victoryScreen.classList.add('show');
      } else if (newState === 'paused') {
        pauseScreen.classList.add('show');
      } else if (newState === 'playing') {
        gameOverScreen.classList.remove('show');
        victoryScreen.classList.remove('show');
        pauseScreen.classList.remove('show');
      }
    });

    // Import and start game
    import('./src/mainV3.js').catch(err => {
      console.error('Failed to load game:', err);
      loader.innerHTML = '<div style="color: #ff6b6b; font-size: 18px;">Failed to load game</div>';
    });
  </script>
</body>
</html>
