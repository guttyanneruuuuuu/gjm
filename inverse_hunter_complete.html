<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Inverse Hunter — 食物連鎖を逆走する3DアクションRPG</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%90%BA</text></svg>">
  <style>
    :root {
      --gold: #e7c878;
      --gold2: #c79b4a;
      --bg: #05080c;
      --ink: #e8e2d4;
      --green: #8fb09c;
      --red: #e07b7b;
      --blue: #86a0c0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Segoe UI", sans-serif;
      color: var(--ink);
    }

    #game {
      position: fixed;
      inset: 0;
      display: block;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hidden {
      display: none !important;
    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 40%, #16242f 0%, #05080c 75%);
      gap: 22px;
    }

    #loader.hidden {
      display: none;
    }

    #loader .l-title {
      font-size: clamp(24px, 5vw, 42px);
      letter-spacing: 0.2em;
      color: #f2e9d0;
      font-weight: 300;
      text-shadow: 0 0 26px #c79b4a99;
    }

    #loader .l-bar {
      width: min(60vw, 360px);
      height: 6px;
      background: #10171c;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #2a3a30;
    }

    #loader .l-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #c79b4a, #f0d98a);
      transition: width 0.2s;
    }

    #loader .l-tip {
      font-size: 12px;
      color: #7f9486;
      letter-spacing: 0.1em;
      max-width: 80%;
      text-align: center;
      line-height: 1.8;
    }

    #title {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 26%, #16242f 0%, #05080c 72%);
      text-align: center;
      padding: 20px;
      overflow-y: auto;
    }

    #title.hidden {
      display: none;
    }

    #title h1 {
      font-size: clamp(34px, 7vw, 76px);
      letter-spacing: 0.16em;
      color: #f2e9d0;
      text-shadow: 0 0 30px #c79b4a99;
      font-weight: 300;
    }

    #title .sub {
      margin-top: 10px;
      font-size: clamp(12px, 2.4vw, 18px);
      color: var(--green);
      letter-spacing: 0.22em;
    }

    #title .chain {
      margin-top: 24px;
      font-size: clamp(20px, 4.4vw, 36px);
      letter-spacing: 0.08em;
      filter: drop-shadow(0 0 8px #0008);
    }

    #title .tag {
      margin-top: 22px;
      font-size: clamp(11px, 2vw, 15px);
      color: #b7a98a;
      font-style: italic;
      max-width: 560px;
      line-height: 1.7;
      opacity: 0.85;
    }

    #startBtn {
      margin-top: 14px;
      padding: 15px 50px;
      font-size: 17px;
      letter-spacing: 0.28em;
      color: #0a0d12;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 0 30px #c79b4a55;
      transition: transform 0.15s, box-shadow 0.2s;
      font-family: inherit;
    }

    #startBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 52px #c79b4a99;
    }

    #title .hint {
      margin-top: 26px;
      font-size: 12px;
      color: #6d7b72;
      letter-spacing: 0.06em;
      line-height: 1.9;
      max-width: 620px;
    }

    #title .hint b {
      color: #bcae8c;
      font-weight: 600;
    }

    #gameOverScreen, #victoryScreen, #pauseScreen {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: center;
    }

    #gameOverScreen.show, #victoryScreen.show, #pauseScreen.show {
      display: flex;
    }

    #gameOverScreen {
      background: radial-gradient(circle at 50% 50%, #2a0c0c 0%, #05080c 75%);
    }

    #victoryScreen {
      background: radial-gradient(circle at 50% 50%, #0c2a0c 0%, #05080c 75%);
    }

    #pauseScreen {
      background: rgba(5, 8, 12, 0.9);
      backdrop-filter: blur(8px);
    }

    #gameOverScreen h2, #victoryScreen h2, #pauseScreen h2 {
      font-size: clamp(36px, 8vw, 64px);
      letter-spacing: 0.12em;
      text-shadow: 0 0 40px rgba(199, 155, 74, 0.3);
    }

    #gameOverScreen h2 {
      color: #ff6b6b;
    }

    #victoryScreen h2 {
      color: #6bff6b;
    }

    #pauseScreen h2 {
      color: #f2e9d0;
    }

    #gameOverScreen p, #victoryScreen p, #pauseScreen p {
      font-size: clamp(14px, 3vw, 20px);
      color: #bcae8c;
      letter-spacing: 0.08em;
      max-width: 80%;
    }

    #gameOverScreen button, #victoryScreen button {
      margin-top: 20px;
      padding: 12px 40px;
      font-size: 16px;
      letter-spacing: 0.2em;
      color: #0a0d12;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 30px #c79b4a55;
      transition: transform 0.15s, box-shadow 0.2s;
      font-family: inherit;
    }

    #gameOverScreen button:hover, #victoryScreen button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 52px #c79b4a99;
    }

    @media (max-width: 768px) {
      #startBtn {
        padding: 12px 30px;
        font-size: 14px;
      }

      #title .hint {
        font-size: 11px;
      }
    }

    @media (max-height: 600px) {
      #title {
        justify-content: flex-start;
        padding-top: 40px;
      }

      #title h1 {
        font-size: 32px;
      }

      #title .sub {
        font-size: 12px;
        margin-top: 6px;
      }

      #title .chain {
        font-size: 18px;
        margin-top: 12px;
      }

      #title .tag {
        font-size: 10px;
        margin-top: 12px;
      }

      #startBtn {
        margin-top: 8px;
        padding: 10px 30px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="loader">
    <div class="l-title">INVERSE HUNTER</div>
    <div class="l-bar">
      <div class="l-fill"></div>
    </div>
    <div class="l-tip">食物連鎖を逆走する3DアクションRPG</div>
  </div>

  <div id="title">
    <h1>INVERSE HUNTER</h1>
    <div class="sub">食物連鎖を逆走する</div>
    <div class="chain">🐭 → 🦊 → 🐍 → 🦅 → 🐺</div>
    <div class="tag">弱者が連鎖を昇り、やがて守る者になる</div>
    <button id="startBtn">START GAME</button>
    <div class="hint">
      <b>PC:</b> WASD/矢印キーで移動、マウスで視点操作、クリックで攻撃<br>
      <b>スマホ:</b> 左ジョイスティックで移動、右スワイプで視点操作、ボタンで攻撃
    </div>
  </div>

  <div id="pauseScreen">
    <h2>PAUSED</h2>
    <p>Press P to resume</p>
  </div>

  <div id="gameOverScreen">
    <h2>GAME OVER</h2>
    <p>You were defeated...</p>
    <button onclick="location.reload()">RESTART</button>
  </div>

  <div id="victoryScreen">
    <h2>VICTORY!</h2>
    <p>You conquered the food chain!</p>
    <button onclick="location.reload()">PLAY AGAIN</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ========== GAME BALANCE CONFIGURATION ==========
    const GAME_BALANCE = {
      difficulty: { easy: 0.7, normal: 1.0, hard: 1.3, insane: 1.6 },
      currentDifficulty: 'normal',
      player: {
        maxHp: 150, hpRegenRate: 5, hpRegenDelay: 3,
        maxStamina: 100, staminaRegenRate: 30, staminaSprintCost: 20,
        maxInstinct: 100, instinctRegenRate: 15,
        baseSpeed: 12, sprintMultiplier: 1.4, acceleration: 18, deceleration: 12,
        jumpForce: 16, airControl: 0.6,
        baseAttackDamage: 15, attackCooldown: 0.4, attackRange: 3,
        attackCone: Math.PI / 3, critChance: 0.15, critMultiplier: 1.8,
        dashSpeed: 25, dashDuration: 0.3, dashCooldown: 1.2, dashStaminaCost: 20,
        lockOnRange: 30, lockOnSwitchSpeed: 0.3,
      },
      forms: {
        mouse: { name: 'ネズミ', emoji: '🐭', speedMultiplier: 1.2, jumpMultiplier: 1.0, damageMultiplier: 0.8, defenseMultiplier: 0.7, canFly: false },
        fox: { name: 'キツネ', emoji: '🦊', speedMultiplier: 1.1, jumpMultiplier: 1.2, damageMultiplier: 1.0, defenseMultiplier: 0.9, canFly: false },
        snake: { name: 'ヘビ', emoji: '🐍', speedMultiplier: 0.9, jumpMultiplier: 0.7, damageMultiplier: 1.1, defenseMultiplier: 1.0, canFly: false },
        eagle: { name: 'ワシ', emoji: '🦅', speedMultiplier: 1.0, jumpMultiplier: 1.5, damageMultiplier: 1.2, defenseMultiplier: 0.8, canFly: true },
        wolf: { name: 'オオカミ', emoji: '🐺', speedMultiplier: 1.15, jumpMultiplier: 1.1, damageMultiplier: 1.3, defenseMultiplier: 1.1, canFly: false },
      },
      enemies: {
        small: { maxHp: 20, attackDamage: 5, attackCooldown: 1.5, speed: 8, senseRange: 20, attackRange: 2 },
        medium: { maxHp: 50, attackDamage: 12, attackCooldown: 1.8, speed: 10, senseRange: 25, attackRange: 2.5 },
        large: { maxHp: 100, attackDamage: 20, attackCooldown: 2.2, speed: 9, senseRange: 30, attackRange: 3 },
        boss: { maxHp: 300, attackDamage: 35, attackCooldown: 2.5, speed: 11, senseRange: 40, attackRange: 3.5 },
      },
      combat: {
        hitChanceBase: 0.85, hitChanceBehind: 0.5, hitChanceAimed: 1.0,
        knockbackBase: 1.0, knockbackMultiplier: 0.5,
        comboTimeout: 2.0, comboMultiplier: 1.1,
        staggerThreshold: 50, staggerDuration: 0.8,
        iFramesDuration: 0.3,
      },
      camera: {
        fov: 70, freeDistance: 14, freeHeight: 8, freePitch: 0.3,
        lockDistance: 10, lockHeight: 6, lockOffsetX: 2, lockOffsetZ: 1,
        followSpeed: 0.15, rotationSpeed: 0.2,
      },
      physics: { gravity: 32, groundDrag: 0.1, airDrag: 0.02, maxVelocity: 50 },
      difficultyMultipliers: {
        easy: { enemyHp: 0.7, enemyDamage: 0.6, enemySpeed: 0.8, playerHp: 1.3, playerDamage: 1.2, experienceMultiplier: 0.8 },
        normal: { enemyHp: 1.0, enemyDamage: 1.0, enemySpeed: 1.0, playerHp: 1.0, playerDamage: 1.0, experienceMultiplier: 1.0 },
        hard: { enemyHp: 1.3, enemyDamage: 1.3, enemySpeed: 1.2, playerHp: 0.9, playerDamage: 0.9, experienceMultiplier: 1.5 },
        insane: { enemyHp: 1.8, enemyDamage: 1.8, enemySpeed: 1.5, playerHp: 0.7, playerDamage: 0.7, experienceMultiplier: 2.5 },
      },
      getDifficultyMultiplier(stat) {
        const multipliers = this.difficultyMultipliers[this.currentDifficulty] || this.difficultyMultipliers.normal;
        return multipliers[stat] || 1.0;
      },
      getPlayerStat(statName) {
        const baseStat = this.player[statName];
        if (typeof baseStat !== 'number') return baseStat;
        if (statName === 'maxHp' || statName === 'baseAttackDamage') {
          return baseStat * this.getDifficultyMultiplier(`player${statName.charAt(0).toUpperCase() + statName.slice(1)}`);
        }
        return baseStat;
      },
      getFormStat(formId, statName) {
        const form = this.forms[formId];
        if (!form) return 1;
        return form[statName] || 1;
      },
      getEnemyStat(enemyType, statName) {
        const baseStat = this.enemies[enemyType]?.[statName];
        if (typeof baseStat !== 'number') return baseStat;
        const multiplierKey = statName === 'attackDamage' ? 'enemyDamage' : statName === 'maxHp' ? 'enemyHp' : statName === 'speed' ? 'enemySpeed' : null;
        if (multiplierKey) return baseStat * this.getDifficultyMultiplier(multiplierKey);
        return baseStat;
      },
      setDifficulty(difficulty) {
        if (this.difficultyMultipliers[difficulty]) {
          this.currentDifficulty = difficulty;
          console.log(`Difficulty set to: ${difficulty}`);
        }
      },
      getFormIds() { return Object.keys(this.forms); },
      getEnemyTypes() { return Object.keys(this.enemies); },
    };

    // ========== UTILITY FUNCTIONS ==========
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const lerp = (a, b, t) => a + (b - a) * t;
    const TAU = Math.PI * 2;

    // ========== INPUT MANAGER ==========
    class InputManager {
      constructor(isMobile = false) {
        this.isMobile = isMobile;
        this.keys = {};
        this.pressed = {};
        this.mouseX = 0;
        this.mouseY = 0;
        this.mouseLook = false;
        this.yaw = 0;
        this.pitch = 0;
        this.moveX = 0;
        this.moveZ = 0;
        this.mobileJoyX = 0;
        this.mobileJoyY = 0;

        this.setupKeyboardInput();
        this.setupMouseInput();
        this.setupTouchInput();
      }

      setupKeyboardInput() {
        window.addEventListener('keydown', (e) => {
          const k = e.key.toLowerCase();
          this.keys[k] = true;
          if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' ', 'shift', 'control'].includes(k)) {
            e.preventDefault();
          }
        });
        window.addEventListener('keyup', (e) => { this.keys[e.key.toLowerCase()] = false; });
      }

      setupMouseInput() {
        document.addEventListener('mousemove', (e) => {
          this.mouseX = e.clientX;
          this.mouseY = e.clientY;
          if (this.mouseLook) {
            this.yaw -= (e.movementX || 0) * 0.003;
            this.pitch -= (e.movementY || 0) * 0.003;
            this.pitch = clamp(this.pitch, -Math.PI / 2, Math.PI / 2);
          }
        });
        document.addEventListener('mousedown', (e) => {
          if (!this.mouseLook && !this.isMobile) this.requestPointerLock(document.body);
          if (e.button === 0) this.press('attack');
          if (e.button === 2) this.press('skill');
        });
        document.addEventListener('pointerlockchange', () => { this.mouseLook = !!document.pointerLockElement; });
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); });
      }

      setupTouchInput() {
        const canvas = document.getElementById('game');
        if (!canvas) return;
        canvas.addEventListener('touchstart', (e) => {
          if (e.touches.length === 1) {
            this.touchStartX = e.touches[0].clientX;
            this.touchStartY = e.touches[0].clientY;
          }
        });
        canvas.addEventListener('touchmove', (e) => {
          if (e.touches.length === 1 && this.touchStartX > window.innerWidth * 0.5) {
            const deltaX = e.touches[0].clientX - this.touchStartX;
            const deltaY = e.touches[0].clientY - this.touchStartY;
            this.yaw -= deltaX * 0.008;
            this.pitch -= deltaY * 0.008;
            this.pitch = clamp(this.pitch, -Math.PI / 2, Math.PI / 2);
            this.touchStartX = e.touches[0].clientX;
            this.touchStartY = e.touches[0].clientY;
          }
        });
      }

      getMovementInput() {
        let ix = 0, iz = 0;
        if (this.keys['w'] || this.keys['arrowup']) iz -= 1;
        if (this.keys['s'] || this.keys['arrowdown']) iz += 1;
        if (this.keys['a'] || this.keys['arrowleft']) ix -= 1;
        if (this.keys['d'] || this.keys['arrowright']) ix += 1;
        if (Math.abs(this.mobileJoyX) > 0.1 || Math.abs(this.mobileJoyY) > 0.1) {
          ix += this.mobileJoyX;
          iz += this.mobileJoyY;
        }
        const il = Math.hypot(ix, iz);
        if (il > 1) { ix /= il; iz /= il; }
        return { x: ix, z: iz, magnitude: il };
      }

      setMobileJoystick(x, y) { this.mobileJoyX = x; this.mobileJoyY = y; }
      isKeyPressed(key) { return this.keys[key.toLowerCase()] === true; }
      isSprinting() { return this.isKeyPressed('shift') || this.isKeyPressed('control'); }
      isJumping() { return this.consume('jump'); }
      isAttacking() { return this.consume('attack'); }
      isSkilling() { return this.consume('skill'); }
      isDashing() { return this.consume('dash'); }
      isLocking() { return this.consume('lock'); }
      isFormNext() { return this.consume('form_next') || this.isKeyPressed('e'); }
      isFormPrev() { return this.consume('form_prev') || this.isKeyPressed('q'); }
      getFormByNumber() {
        if (this.consume('1') || this.isKeyPressed('1')) return 0;
        if (this.consume('2') || this.isKeyPressed('2')) return 1;
        if (this.consume('3') || this.isKeyPressed('3')) return 2;
        if (this.consume('4') || this.isKeyPressed('4')) return 3;
        if (this.consume('5') || this.isKeyPressed('5')) return 4;
        return -1;
      }
      press(name) { this.pressed[name] = true; }
      consume(name) { if (this.pressed[name]) { this.pressed[name] = false; return true; } return false; }
      clearPressed() { this.pressed = {}; }
      requestPointerLock(element) {
        if (!this.isMobile && !this.mouseLook) {
          element.requestPointerLock = element.requestPointerLock || element.mozRequestPointerLock;
          element.requestPointerLock();
        }
      }
      update() { this.clearPressed(); }
    }

    // ========== GAME ENGINE ==========
    class GameEngine {
      constructor(container) {
        this.container = container;
        this.running = false;
        this.state = 'loading';
        this.clock = new THREE.Clock();
        this.deltaTime = 0;
        this.frameCount = 0;
        this.fps = 0;
        this.fpsUpdateTime = 0;

        this.initThreeJS();
        this.input = new InputManager(this.detectMobile());
        this.enemies = [];
        this.updateCallbacks = [];
        this.player = null;
      }

      detectMobile() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
          || (navigator.maxTouchPoints && navigator.maxTouchPoints > 2);
      }

      initThreeJS() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x0a0d12);
        this.scene.fog = new THREE.Fog(0x0a0d12, 200, 500);

        this.renderer = new THREE.WebGLRenderer({ canvas: this.container, antialias: true, alpha: false, powerPreference: 'high-performance' });
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.shadowMap.enabled = true;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;

        this.camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1200);
        this.camera.position.set(0, 8, 14);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        this.scene.add(ambientLight);

        this.sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        this.sunLight.position.set(50, 80, 50);
        this.sunLight.castShadow = true;
        this.sunLight.shadow.mapSize.width = 2048;
        this.sunLight.shadow.mapSize.height = 2048;
        this.sunLight.shadow.camera.far = 200;
        this.sunLight.shadow.camera.left = -100;
        this.sunLight.shadow.camera.right = 100;
        this.sunLight.shadow.camera.top = 100;
        this.sunLight.shadow.camera.bottom = -100;
        this.scene.add(this.sunLight);

        const rimLight = new THREE.DirectionalLight(0xff8844, 0.4);
        rimLight.position.set(-30, 40, -30);
        this.scene.add(rimLight);

        window.addEventListener('resize', () => this.onWindowResize());
      }

      onWindowResize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        this.renderer.setSize(width, height);
        this.camera.aspect = width / height;
        this.camera.updateProjectionMatrix();
      }

      onUpdate(callback) { this.updateCallbacks.push(callback); }

      start() {
        this.running = true;
        this.clock.start();
        this.animate();
      }

      animate = () => {
        requestAnimationFrame(this.animate);
        this.deltaTime = Math.min(this.clock.getDelta(), 0.016);
        this.fpsUpdateTime += this.deltaTime;
        this.frameCount++;
        if (this.fpsUpdateTime >= 1.0) {
          this.fps = this.frameCount;
          this.frameCount = 0;
          this.fpsUpdateTime = 0;
        }

        if (this.state === 'playing') {
          this.input.update();
          for (const callback of this.updateCallbacks) callback(this.deltaTime);
        }

        this.renderer.render(this.scene, this.camera);
      };

      setState(newState) { this.state = newState; }
      getScene() { return this.scene; }
      getRenderer() { return this.renderer; }
      getCamera() { return this.camera; }
      getInput() { return this.input; }
      addEnemy(enemy) { if (!this.enemies.includes(enemy)) this.enemies.push(enemy); }
      removeEnemy(enemy) { const idx = this.enemies.indexOf(enemy); if (idx > -1) this.enemies.splice(idx, 1); }
      getEnemies() { return this.enemies; }
      getFPS() { return this.fps; }
      getDeltaTime() { return this.deltaTime; }
      dispose() {
        this.running = false;
        this.renderer.dispose();
      }
    }

    // ========== PARTICLE SYSTEM ==========
    class ParticleSystem {
      constructor(scene) {
        this.scene = scene;
        this.particles = [];
        this.maxParticles = 2000;
        this.geometry = new THREE.BufferGeometry();
        this.positions = new Float32Array(this.maxParticles * 3);
        this.colors = new Float32Array(this.maxParticles * 3);
        this.sizes = new Float32Array(this.maxParticles);
        this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
        this.geometry.setAttribute('color', new THREE.BufferAttribute(this.colors, 3));
        this.geometry.setAttribute('size', new THREE.BufferAttribute(this.sizes, 1));
        const material = new THREE.PointsMaterial({
          size: 0.3, sizeAttenuation: true, vertexColors: true, transparent: true,
          depthWrite: false, blending: THREE.AdditiveBlending,
        });
        this.points = new THREE.Points(this.geometry, material);
        this.scene.add(this.points);
      }

      spawn(position, velocity, lifetime, color = 0xffffff, opacity = 1.0) {
        if (this.particles.length >= this.maxParticles) this.particles.shift();
        this.particles.push({
          position: position.clone(), velocity: velocity.clone(), lifetime, maxLifetime: lifetime,
          color: new THREE.Color(color), opacity, size: 0.5 + Math.random() * 0.5, maxSize: 0.5 + Math.random() * 0.5,
        });
      }

      update(dt) {
        for (let i = 0; i < this.particles.length; i++) {
          const p = this.particles[i];
          p.lifetime -= dt;
          if (p.lifetime <= 0) { this.particles.splice(i, 1); i--; continue; }
          p.position.add(p.velocity.clone().multiplyScalar(dt));
          p.velocity.y -= 9.8 * dt;
          const progress = 1 - (p.lifetime / p.maxLifetime);
          p.size = p.maxSize * (1 - progress * progress);
          p.opacity = Math.max(0, 1 - progress * 1.2);
        }
        this.updateGeometry();
      }

      updateGeometry() {
        for (let i = 0; i < this.particles.length; i++) {
          const p = this.particles[i];
          this.positions[i * 3] = p.position.x;
          this.positions[i * 3 + 1] = p.position.y;
          this.positions[i * 3 + 2] = p.position.z;
          this.colors[i * 3] = p.color.r;
          this.colors[i * 3 + 1] = p.color.g;
          this.colors[i * 3 + 2] = p.color.b;
          this.sizes[i] = p.size;
        }
        this.geometry.attributes.position.needsUpdate = true;
        this.geometry.attributes.color.needsUpdate = true;
        this.geometry.attributes.size.needsUpdate = true;
        this.geometry.setDrawRange(0, this.particles.length);
      }
    }

    // ========== PLAYER ==========
    class Player {
      constructor(engine, startPos = { x: 0, y: 5, z: 0 }) {
        this.engine = engine;
        this.scene = engine.getScene();
        this.input = engine.getInput();
        this.position = new THREE.Vector3(startPos.x, startPos.y, startPos.z);
        this.velocity = new THREE.Vector3(0, 0, 0);
        this.yaw = 0;
        this.pitch = 0;
        this.maxHp = GAME_BALANCE.getPlayerStat('maxHp');
        this.hp = this.maxHp;
        this.maxStamina = GAME_BALANCE.player.maxStamina;
        this.stamina = this.maxStamina;
        this.maxInstinct = GAME_BALANCE.player.maxInstinct;
        this.instinct = this.maxInstinct;
        this.speed = GAME_BALANCE.player.baseSpeed;
        this.acceleration = GAME_BALANCE.player.acceleration;
        this.jumpForce = GAME_BALANCE.player.jumpForce;
        this.grounded = false;
        this.isSprinting = false;
        this.forms = GAME_BALANCE.forms;
        this.currentFormId = 'mouse';
        this.unlockedForms = ['mouse'];
        this.formSwitchCooldown = 0;
        this.attacking = false;
        this.attackCooldown = 0;
        this.attackDamage = GAME_BALANCE.getPlayerStat('baseAttackDamage');
        this.comboCounter = 0;
        this.comboTimeout = 0;
        this.lockedTarget = null;
        this.iFrames = 0;
        this.dashing = false;
        this.dashCooldown = 0;
        this.dashDirection = new THREE.Vector3(0, 0, 1);

        this.createVisuals();
        this.engine.onUpdate((dt) => this.update(dt));
      }

      createVisuals() {
        this.group = new THREE.Group();
        this.group.position.copy(this.position);
        this.scene.add(this.group);

        const geometry = new THREE.CapsuleGeometry(0.35, 1.4, 4, 8);
        const material = new THREE.MeshStandardMaterial({ color: 0xaa8844, metalness: 0.2, roughness: 0.7 });
        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.castShadow = true;
        this.mesh.receiveShadow = true;
        this.group.add(this.mesh);

        const eyeGeometry = new THREE.SphereGeometry(0.1, 8, 8);
        const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
        this.leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        this.leftEye.position.set(-0.12, 0.35, 0.3);
        this.group.add(this.leftEye);
        this.rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        this.rightEye.position.set(0.12, 0.35, 0.3);
        this.group.add(this.rightEye);

        const glowGeometry = new THREE.SphereGeometry(0.5, 8, 8);
        const glowMaterial = new THREE.MeshBasicMaterial({ color: 0xc79b4a, transparent: true, opacity: 0.1 });
        this.glow = new THREE.Mesh(glowGeometry, glowMaterial);
        this.group.add(this.glow);
      }

      update(dt) {
        this.attackCooldown = Math.max(0, this.attackCooldown - dt);
        this.formSwitchCooldown = Math.max(0, this.formSwitchCooldown - dt);
        this.dashCooldown = Math.max(0, this.dashCooldown - dt);
        this.comboTimeout = Math.max(0, this.comboTimeout - dt);
        this.iFrames = Math.max(0, this.iFrames - dt);
        if (this.comboTimeout <= 0) this.comboCounter = 0;

        const movement = this.input.getMovementInput();
        this.yaw = this.input.yaw;
        this.pitch = this.input.pitch;

        this.handleFormSwitching();

        const fwd = new THREE.Vector3(Math.sin(this.yaw), 0, Math.cos(this.yaw));
        const right = new THREE.Vector3(Math.cos(this.yaw), 0, -Math.sin(this.yaw));
        const desired = new THREE.Vector3(0, 0, 0);
        desired.addScaledVector(fwd, movement.z);
        desired.addScaledVector(right, movement.x);
        if (desired.lengthSq() > 0) desired.normalize();

        const formStats = this.forms[this.currentFormId];
        const moveSpeed = GAME_BALANCE.player.baseSpeed * formStats.speedMultiplier;
        this.isSprinting = this.input.isSprinting() && this.stamina > 0 && movement.magnitude > 0;
        const finalSpeed = moveSpeed * (this.isSprinting ? GAME_BALANCE.player.sprintMultiplier : 1.0);
        desired.multiplyScalar(finalSpeed);

        const accelFactor = clamp(this.acceleration * dt, 0, 1);
        this.velocity.x = lerp(this.velocity.x, desired.x, accelFactor);
        this.velocity.z = lerp(this.velocity.z, desired.z, accelFactor);

        const horizontalSpeed = Math.hypot(this.velocity.x, this.velocity.z);
        if (horizontalSpeed > GAME_BALANCE.physics.maxVelocity) {
          const scale = GAME_BALANCE.physics.maxVelocity / horizontalSpeed;
          this.velocity.x *= scale;
          this.velocity.z *= scale;
        }

        this.velocity.y += -GAME_BALANCE.physics.gravity * dt;
        this.position.x += this.velocity.x * dt;
        this.position.y += this.velocity.y * dt;
        this.position.z += this.velocity.z * dt;

        if (this.position.y < 0.5) {
          this.position.y = 0.5;
          this.velocity.y = 0;
          this.grounded = true;
        } else {
          this.grounded = false;
        }

        if (this.input.isJumping() && this.grounded && !this.dashing) {
          this.velocity.y = this.jumpForce;
          this.grounded = false;
        }

        if (this.input.isDashing() && this.dashCooldown <= 0 && this.stamina >= GAME_BALANCE.player.dashStaminaCost) {
          this.startDash(movement);
        }

        if (this.dashing) this.updateDash(dt);

        if (this.input.isLocking()) this.toggleLockOn();
        if (this.input.isAttacking() && this.attackCooldown <= 0) this.performAttack();

        if (this.isSprinting) {
          this.stamina = Math.max(0, this.stamina - GAME_BALANCE.player.staminaSprintCost * dt);
        } else {
          this.stamina = Math.min(this.maxStamina, this.stamina + GAME_BALANCE.player.staminaRegenRate * dt);
        }

        this.instinct = Math.min(this.maxInstinct, this.instinct + GAME_BALANCE.player.instinctRegenRate * dt);
        this.updateVisuals();
      }

      handleFormSwitching() {
        if (this.formSwitchCooldown > 0) return;
        const formIndex = this.input.getFormByNumber();
        if (formIndex >= 0) {
          const formIds = GAME_BALANCE.getFormIds();
          if (formIndex < formIds.length) this.transformTo(formIds[formIndex]);
        }
        if (this.input.isFormNext()) this.cycleFormNext();
        if (this.input.isFormPrev()) this.cycleFormPrev();
      }

      startDash(movement) {
        this.dashing = true;
        this.dashCooldown = GAME_BALANCE.player.dashCooldown;
        this.stamina -= GAME_BALANCE.player.dashStaminaCost;
        if (movement.magnitude > 0.1) {
          const fwd = new THREE.Vector3(Math.sin(this.yaw), 0, Math.cos(this.yaw));
          const right = new THREE.Vector3(Math.cos(this.yaw), 0, -Math.sin(this.yaw));
          this.dashDirection.copy(fwd).multiplyScalar(movement.z).add(right.multiplyScalar(movement.x));
          this.dashDirection.normalize();
        } else {
          const fwd = new THREE.Vector3(Math.sin(this.yaw), 0, Math.cos(this.yaw));
          this.dashDirection.copy(fwd);
        }
        this.velocity.x = this.dashDirection.x * GAME_BALANCE.player.dashSpeed;
        this.velocity.z = this.dashDirection.z * GAME_BALANCE.player.dashSpeed;
      }

      updateDash(dt) {
        if (this.formSwitchCooldown > GAME_BALANCE.player.dashDuration) this.dashing = false;
      }

      toggleLockOn() {
        if (this.lockedTarget) {
          this.lockedTarget = null;
        } else {
          const enemies = this.engine.getEnemies();
          if (enemies.length > 0) {
            let nearest = null;
            let minDist = Infinity;
            for (const enemy of enemies) {
              const dist = this.position.distanceTo(enemy.position);
              if (dist < minDist && dist < GAME_BALANCE.player.lockOnRange) {
                minDist = dist;
                nearest = enemy;
              }
            }
            this.lockedTarget = nearest;
          }
        }
      }

      performAttack() {
        this.attacking = true;
        this.attackCooldown = GAME_BALANCE.player.attackCooldown;
        this.comboCounter++;
        this.comboTimeout = GAME_BALANCE.combat.comboTimeout;

        let damage = this.attackDamage * this.forms[this.currentFormId].damageMultiplier;
        damage *= (1 + (this.comboCounter - 1) * 0.1);
        const isCrit = Math.random() < GAME_BALANCE.player.critChance;
        if (isCrit) damage *= GAME_BALANCE.player.critMultiplier;

        const enemies = this.engine.getEnemies();
        const fwd = new THREE.Vector3(Math.sin(this.yaw), 0, Math.cos(this.yaw));
        const attackCone = GAME_BALANCE.player.attackCone;
        const attackRange = GAME_BALANCE.player.attackRange;

        for (const enemy of enemies) {
          const toEnemy = enemy.position.clone().sub(this.position);
          const dist = toEnemy.length();
          if (dist > attackRange) continue;
          toEnemy.normalize();
          const dotProduct = toEnemy.dot(fwd);
          const angleToEnemy = Math.acos(Math.max(-1, Math.min(1, dotProduct)));
          if (angleToEnemy > attackCone / 2) continue;
          enemy.takeDamage(damage, isCrit);
          const knockback = this.dashDirection.clone().multiplyScalar(GAME_BALANCE.combat.knockbackBase);
          enemy.velocity.add(knockback);
        }
      }

      transformTo(formId) {
        if (this.currentFormId === formId) return;
        if (!this.unlockedForms.includes(formId)) return;
        if (this.formSwitchCooldown > 0) return;
        this.currentFormId = formId;
        this.formSwitchCooldown = 0.3;
        const formStats = this.forms[formId];
        this.jumpForce = GAME_BALANCE.player.jumpForce * formStats.jumpMultiplier;
      }

      cycleFormNext() {
        const formIds = GAME_BALANCE.getFormIds();
        const currentIndex = formIds.indexOf(this.currentFormId);
        const nextIndex = (currentIndex + 1) % formIds.length;
        this.transformTo(formIds[nextIndex]);
      }

      cycleFormPrev() {
        const formIds = GAME_BALANCE.getFormIds();
        const currentIndex = formIds.indexOf(this.currentFormId);
        const prevIndex = (currentIndex - 1 + formIds.length) % formIds.length;
        this.transformTo(formIds[prevIndex]);
      }

      unlockForm(formId) {
        if (!this.unlockedForms.includes(formId)) this.unlockedForms.push(formId);
      }

      takeDamage(amount, isCrit = false) {
        if (this.iFrames > 0) return;
        this.hp = Math.max(0, this.hp - amount);
        this.iFrames = GAME_BALANCE.combat.iFramesDuration;
        if (this.hp <= 0) this.die();
      }

      heal(amount) {
        this.hp = Math.min(this.maxHp, this.hp + amount);
      }

      die() {
        console.log('Player died');
        this.engine.setState('gameOver');
      }

      updateVisuals() {
        const colors = { mouse: 0xaa8844, fox: 0xff9944, snake: 0x44aa44, eagle: 0xddaa44, wolf: 0x888888 };
        this.mesh.material.color.setHex(colors[this.currentFormId] || 0xaa8844);
        this.glow.material.opacity = 0.1 + (this.instinct / this.maxInstinct) * 0.3;
        if (this.velocity.lengthSq() > 0.1) {
          const targetYaw = Math.atan2(this.velocity.x, this.velocity.z);
          this.group.rotation.y = lerp(this.group.rotation.y, targetYaw, 0.15);
        }
      }

      getPosition() { return this.position.clone(); }
      getStats() {
        return {
          hp: this.hp, maxHp: this.maxHp, stamina: this.stamina, maxStamina: this.maxStamina,
          instinct: this.instinct, maxInstinct: this.maxInstinct, form: this.currentFormId,
          formName: this.forms[this.currentFormId].name, formEmoji: this.forms[this.currentFormId].emoji,
          combo: this.comboCounter, targetLocked: this.lockedTarget !== null, dashing: this.dashing,
        };
      }
    }

    // ========== ENEMY ==========
    class Enemy {
      constructor(engine, enemyType = 'small', position = { x: 0, y: 0, z: 0 }) {
        this.engine = engine;
        this.scene = engine.getScene();
        this.enemyType = enemyType;
        this.position = new THREE.Vector3(position.x, position.y, position.z);
        this.velocity = new THREE.Vector3(0, 0, 0);
        this.maxHp = GAME_BALANCE.getEnemyStat(enemyType, 'maxHp');
        this.hp = this.maxHp;
        this.attackDamage = GAME_BALANCE.getEnemyStat(enemyType, 'attackDamage');
        this.attackCooldown = GAME_BALANCE.getEnemyStat(enemyType, 'attackCooldown');
        this.speed = GAME_BALANCE.getEnemyStat(enemyType, 'speed');
        this.senseRange = GAME_BALANCE.getEnemyStat(enemyType, 'senseRange');
        this.attackRange = GAME_BALANCE.getEnemyStat(enemyType, 'attackRange');
        this.state = 'idle';
        this.target = null;
        this.lastAttackTime = 0;
        this.stateChangeTime = 0;
        this.patrolTarget = this.position.clone();
        this.grounded = true;

        this.createVisuals();
        this.engine.addEnemy(this);
        this.engine.onUpdate((dt) => this.update(dt));
      }

      createVisuals() {
        this.group = new THREE.Group();
        this.group.position.copy(this.position);
        this.scene.add(this.group);

        const colors = { small: 0xff6b6b, medium: 0xffaa44, large: 0xdd9944, boss: 0xff4444 };
        const sizes = { small: { radius: 0.25, height: 0.8 }, medium: { radius: 0.35, height: 1.2 }, large: { radius: 0.45, height: 1.6 }, boss: { radius: 0.6, height: 2.0 } };
        const size = sizes[this.enemyType] || sizes.small;
        const geometry = new THREE.CapsuleGeometry(size.radius, size.height, 4, 8);
        const material = new THREE.MeshStandardMaterial({ color: colors[this.enemyType] || 0xff6b6b, metalness: 0.1, roughness: 0.8 });
        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.castShadow = true;
        this.mesh.receiveShadow = true;
        this.group.add(this.mesh);

        const eyeGeometry = new THREE.SphereGeometry(size.radius * 0.4, 8, 8);
        const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
        this.leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        this.leftEye.position.set(-size.radius * 0.5, size.height * 0.3, size.radius * 0.8);
        this.group.add(this.leftEye);
        this.rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        this.rightEye.position.set(size.radius * 0.5, size.height * 0.3, size.radius * 0.8);
        this.group.add(this.rightEye);
      }

      update(dt) {
        if (this.hp <= 0) { this.state = 'dead'; return; }
        const player = this.engine.player;
        if (!player) return;

        const toPlayer = player.position.clone().sub(this.position);
        const distToPlayer = toPlayer.length();

        switch (this.state) {
          case 'idle':
            this.stateChangeTime += dt;
            if (distToPlayer < this.senseRange) {
              this.state = 'chase';
              this.target = player;
              this.stateChangeTime = 0;
            } else if (this.stateChangeTime > 3) {
              this.state = 'patrol';
              this.patrolTarget = this.position.clone().add(new THREE.Vector3((Math.random() - 0.5) * 20, 0, (Math.random() - 0.5) * 20));
              this.stateChangeTime = 0;
            }
            break;
          case 'patrol':
            if (distToPlayer < this.senseRange) {
              this.state = 'chase';
              this.target = player;
              this.stateChangeTime = 0;
              return;
            }
            const toPatrol = this.patrolTarget.clone().sub(this.position);
            const distToPatrol = toPatrol.length();
            if (distToPatrol < 2) {
              this.state = 'idle';
              this.stateChangeTime = 0;
              return;
            }
            toPatrol.normalize();
            this.velocity.x = toPatrol.x * this.speed;
            this.velocity.z = toPatrol.z * this.speed;
            break;
          case 'chase':
            if (distToPlayer > this.senseRange * 1.5) {
              this.state = 'idle';
              this.target = null;
              this.stateChangeTime = 0;
              return;
            }
            if (distToPlayer < this.attackRange) {
              this.state = 'attack';
              this.stateChangeTime = 0;
              return;
            }
            const toPlayer2 = player.position.clone().sub(this.position);
            toPlayer2.normalize();
            this.velocity.x = toPlayer2.x * this.speed;
            this.velocity.z = toPlayer2.z * this.speed;
            if (this.grounded && Math.random() < 0.02) this.velocity.y = 10;
            break;
          case 'attack':
            const toPlayer3 = player.position.clone().sub(this.position);
            const distToPlayer2 = toPlayer3.length();
            if (distToPlayer2 > this.attackRange * 1.5) {
              this.state = 'chase';
              this.stateChangeTime = 0;
              return;
            }
            toPlayer3.normalize();
            this.velocity.x = toPlayer3.x * this.speed * 0.5;
            this.velocity.z = toPlayer3.z * this.speed * 0.5;
            this.lastAttackTime += dt;
            if (this.lastAttackTime >= this.attackCooldown) {
              this.performAttack(player);
              this.lastAttackTime = 0;
            }
            break;
        }

        this.velocity.y += -GAME_BALANCE.physics.gravity * dt;
        this.position.x += this.velocity.x * dt;
        this.position.y += this.velocity.y * dt;
        this.position.z += this.velocity.z * dt;

        if (this.position.y < 0.5) {
          this.position.y = 0.5;
          this.velocity.y = 0;
          this.grounded = true;
        } else {
          this.grounded = false;
        }

        this.updateVisuals();
      }

      performAttack(player) {
        const toPlayer = player.position.clone().sub(this.position);
        const distToPlayer = toPlayer.length();
        if (distToPlayer > this.attackRange) return;
        const variance = 0.8 + Math.random() * 0.4;
        const damage = this.attackDamage * variance;
        toPlayer.normalize();
        const knockback = toPlayer.clone().multiplyScalar(2);
        player.takeDamage(damage, false);
        player.velocity.add(knockback);
      }

      takeDamage(amount, isCrit = false) {
        this.hp = Math.max(0, this.hp - amount);
        if (this.hp < this.maxHp * 0.3 && this.state !== 'flee') this.state = 'flee';
        if (this.hp <= 0) this.die();
      }

      die() {
        this.state = 'dead';
        setTimeout(() => this.dispose(), 1000);
      }

      updateVisuals() {
        this.group.position.copy(this.position);
        if (this.velocity.lengthSq() > 0.1) {
          const targetYaw = Math.atan2(this.velocity.x, this.velocity.z);
          this.group.rotation.y = lerp(this.group.rotation.y, targetYaw, 0.1);
        }
      }

      dispose() {
        this.scene.remove(this.group);
        this.engine.removeEnemy(this);
      }
    }

    // ========== WORLD BUILDER ==========
    class WorldBuilder {
      constructor(engine) {
        this.engine = engine;
        this.scene = engine.getScene();
        this.currentStage = -1;
      }

      buildStage(stageIndex) {
        this.clearStage();
        this.currentStage = stageIndex;
        this.buildGround();
        this.buildEnvironment(stageIndex);
        this.spawnEnemies(stageIndex);
      }

      clearStage() {
        const enemies = this.engine.getEnemies().slice();
        for (const enemy of enemies) enemy.dispose();
        const toRemove = [];
        this.scene.traverse((obj) => { if (obj.userData.isStageObject) toRemove.push(obj); });
        for (const obj of toRemove) {
          this.scene.remove(obj);
          if (obj.geometry) obj.geometry.dispose();
          if (obj.material) (Array.isArray(obj.material) ? obj.material : [obj.material]).forEach(m => m.dispose());
        }
      }

      buildGround() {
        const groundGeometry = new THREE.PlaneGeometry(200, 200);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x4a6b4a, metalness: 0, roughness: 0.9 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        ground.userData.isStageObject = true;
        this.scene.add(ground);

        const positions = [
          { x: 20, y: 0, z: 20, scale: 3 },
          { x: -20, y: 0, z: 20, scale: 2.5 },
          { x: 20, y: 0, z: -20, scale: 2.8 },
          { x: -20, y: 0, z: -20, scale: 3.2 },
          { x: 0, y: 0, z: 30, scale: 2 },
          { x: 0, y: 0, z: -30, scale: 2.2 },
        ];
        for (const pos of positions) {
          const geometry = new THREE.SphereGeometry(pos.scale, 8, 8);
          const material = new THREE.MeshStandardMaterial({ color: 0x5a7a5a, metalness: 0, roughness: 0.8 });
          const mesh = new THREE.Mesh(geometry, material);
          mesh.position.set(pos.x, pos.y + pos.scale * 0.5, pos.z);
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          mesh.userData.isStageObject = true;
          this.scene.add(mesh);
        }
      }

      buildEnvironment(stageIndex) {
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          const distance = 40;
          const x = Math.cos(angle) * distance;
          const z = Math.sin(angle) * distance;
          this.addTree(x, 0, z);
        }
        for (let i = 0; i < 12; i++) {
          const x = (Math.random() - 0.5) * 80;
          const z = (Math.random() - 0.5) * 80;
          const scale = 0.5 + Math.random() * 1.5;
          this.addRock(x, 0, z, scale);
        }
      }

      addTree(x, y, z, scale = 1) {
        const trunkGeometry = new THREE.CylinderGeometry(0.4 * scale, 0.5 * scale, 6 * scale, 8);
        const trunkMaterial = new THREE.MeshStandardMaterial({ color: 0x8b6914, metalness: 0, roughness: 0.8 });
        const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
        trunk.position.set(x, y + 3 * scale, z);
        trunk.castShadow = true;
        trunk.receiveShadow = true;
        trunk.userData.isStageObject = true;
        this.scene.add(trunk);

        const foliageGeometry = new THREE.SphereGeometry(3 * scale, 8, 8);
        const foliageMaterial = new THREE.MeshStandardMaterial({ color: 0x4a7a3a, metalness: 0, roughness: 0.7 });
        const foliage = new THREE.Mesh(foliageGeometry, foliageMaterial);
        foliage.position.set(x, y + 7 * scale, z);
        foliage.castShadow = true;
        foliage.receiveShadow = true;
        foliage.userData.isStageObject = true;
        this.scene.add(foliage);
      }

      addRock(x, y, z, scale = 1) {
        const geometry = new THREE.IcosahedronGeometry(scale, 4);
        const material = new THREE.MeshStandardMaterial({ color: 0x7a7a7a, metalness: 0.2, roughness: 0.8 });
        const rock = new THREE.Mesh(geometry, material);
        rock.position.set(x, y + scale, z);
        rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        rock.castShadow = true;
        rock.receiveShadow = true;
        rock.userData.isStageObject = true;
        this.scene.add(rock);
      }

      spawnEnemies(stageIndex) {
        const spawns = [
          { type: 'small', position: { x: 15, y: 0, z: 15 } },
          { type: 'small', position: { x: -15, y: 0, z: 15 } },
          { type: 'small', position: { x: 15, y: 0, z: -15 } },
          { type: 'medium', position: { x: 0, y: 0, z: 25 } },
        ];
        for (const spawn of spawns) new Enemy(this.engine, spawn.type, spawn.position);
      }
    }

    // ========== HUD SYSTEM ==========
    class HUDSystem {
      constructor(engine) {
        this.engine = engine;
        this.container = document.createElement('div');
        this.container.id = 'hud';
        this.container.style.cssText = `
          position: fixed; inset: 0; z-index: 20; pointer-events: none;
          font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Segoe UI", sans-serif;
          color: #e8e2d4;
        `;

        const playerInfo = document.createElement('div');
        playerInfo.id = 'player-info';
        playerInfo.style.cssText = `
          position: absolute; top: 12px; left: 12px;
          background: rgba(10, 15, 20, 0.8); border: 1px solid rgba(42, 58, 48, 0.8);
          border-radius: 12px; padding: 12px 16px; backdrop-filter: blur(4px); min-width: 200px;
        `;
        playerInfo.innerHTML = `
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
            <span id="form-emoji" style="font-size: 24px;">🐭</span>
            <span id="form-name" style="font-size: 14px; letter-spacing: 0.1em; color: #dfe7df;">ネズミ</span>
          </div>
          <div style="font-size: 11px; color: #9fb0a4; letter-spacing: 0.1em; margin-bottom: 4px; display: flex; justify-content: space-between;">
            <span>HP</span><span id="hp-text">150/150</span>
          </div>
          <div style="height: 8px; background: #10171c; border-radius: 4px; overflow: hidden; border: 1px solid #2a3a30; margin-bottom: 8px;">
            <div id="hp-fill" style="height: 100%; width: 100%; background: linear-gradient(90deg, #8a3a3a, #e07b7b); transition: width 0.15s;"></div>
          </div>
          <div style="font-size: 11px; color: #9fb0a4; letter-spacing: 0.1em; margin-bottom: 4px; display: flex; justify-content: space-between;">
            <span>STAMINA</span><span id="stamina-text">100/100</span>
          </div>
          <div style="height: 8px; background: #10171c; border-radius: 4px; overflow: hidden; border: 1px solid #2a3a30; margin-bottom: 8px;">
            <div id="stamina-fill" style="height: 100%; width: 100%; background: linear-gradient(90deg, #3a6a8a, #7bd0e0); transition: width 0.15s;"></div>
          </div>
          <div style="font-size: 11px; color: #9fb0a4; letter-spacing: 0.1em; margin-bottom: 4px; display: flex; justify-content: space-between;">
            <span>INSTINCT</span><span id="instinct-text">100/100</span>
          </div>
          <div style="height: 8px; background: #10171c; border-radius: 4px; overflow: hidden; border: 1px solid #2a3a30;">
            <div id="instinct-fill" style="height: 100%; width: 100%; background: linear-gradient(90deg, #c79b4a, #f0d98a); transition: width 0.15s;"></div>
          </div>
        `;
        this.container.appendChild(playerInfo);

        const stats = document.createElement('div');
        stats.id = 'stats-panel';
        stats.style.cssText = `
          position: absolute; right: 12px; bottom: 12px;
          background: rgba(10, 15, 20, 0.8); border: 1px solid rgba(42, 58, 48, 0.8);
          border-radius: 10px; padding: 12px; backdrop-filter: blur(4px);
          max-width: 200px; font-size: 11px; color: #c8cabd; line-height: 1.8;
        `;
        stats.innerHTML = `
          <div style="display: flex; justify-content: space-between;">
            <span>FPS</span><span id="fps-value">60</span>
          </div>
          <div style="display: flex; justify-content: space-between;">
            <span>COMBO</span><span id="combo-value">0</span>
          </div>
          <div style="display: flex; justify-content: space-between;">
            <span>ENEMIES</span><span id="enemies-value">0</span>
          </div>
        `;
        this.container.appendChild(stats);

        const combo = document.createElement('div');
        combo.id = 'combo-counter';
        combo.style.cssText = `
          position: absolute; left: 50%; bottom: 100px; transform: translateX(-50%);
          font-size: clamp(24px, 5vw, 48px); color: #ffd86b; letter-spacing: 0.06em;
          font-weight: 700; opacity: 0; text-shadow: 0 0 14px rgba(199, 155, 74, 0.6);
          transition: opacity 0.2s; pointer-events: none;
        `;
        combo.textContent = 'COMBO x0';
        this.container.appendChild(combo);

        document.body.appendChild(this.container);
      }

      update(player) {
        if (!player) return;
        const stats = player.getStats();
        document.getElementById('form-emoji').textContent = stats.formEmoji;
        document.getElementById('form-name').textContent = stats.formName;
        const hpPercent = (stats.hp / stats.maxHp) * 100;
        const staminaPercent = (stats.stamina / stats.maxStamina) * 100;
        const instinctPercent = (stats.instinct / stats.maxInstinct) * 100;
        document.getElementById('hp-fill').style.width = `${hpPercent}%`;
        document.getElementById('stamina-fill').style.width = `${staminaPercent}%`;
        document.getElementById('instinct-fill').style.width = `${instinctPercent}%`;
        document.getElementById('hp-text').textContent = `${Math.ceil(stats.hp)}/${stats.maxHp}`;
        document.getElementById('stamina-text').textContent = `${Math.ceil(stats.stamina)}/${stats.maxStamina}`;
        document.getElementById('instinct-text').textContent = `${Math.ceil(stats.instinct)}/${stats.maxInstinct}`;
        if (stats.combo > 0) {
          document.getElementById('combo-counter').textContent = `COMBO x${stats.combo}`;
          document.getElementById('combo-counter').style.opacity = '1';
        } else {
          document.getElementById('combo-counter').style.opacity = '0';
        }
        document.getElementById('combo-value').textContent = stats.combo;
        document.getElementById('fps-value').textContent = this.engine.getFPS();
        document.getElementById('enemies-value').textContent = this.engine.getEnemies().length;
      }
    }

    // ========== MOBILE CONTROLS ==========
    class MobileControls {
      constructor(input, engine) {
        this.input = input;
        this.engine = engine;
        this.isActive = engine.detectMobile();
        if (this.isActive) this.createUI();
      }

      createUI() {
        const container = document.createElement('div');
        container.id = 'mobile-controls';
        container.style.cssText = `
          position: fixed; inset: 0; z-index: 30; pointer-events: none;
          display: flex; flex-direction: column; justify-content: space-between;
          padding: 8px; font-family: inherit;
        `;

        // Joystick
        const joystickContainer = document.createElement('div');
        joystickContainer.style.cssText = `
          position: absolute; left: 12px; bottom: 12px; width: 120px; height: 120px;
          border-radius: 50%; background: rgba(255, 255, 255, 0.08);
          border: 2px solid rgba(255, 255, 255, 0.15); pointer-events: auto;
          touch-action: none; display: flex; align-items: center; justify-content: center;
        `;

        const joystickKnob = document.createElement('div');
        joystickKnob.style.cssText = `
          position: absolute; width: 50px; height: 50px; border-radius: 50%;
          background: rgba(231, 200, 120, 0.6); border: 2px solid rgba(255, 255, 255, 0.3);
          left: 50%; top: 50%; transform: translate(-50%, -50%); pointer-events: none;
        `;
        joystickContainer.appendChild(joystickKnob);

        let joystickActive = false;
        let joystickStartX = 0;
        let joystickStartY = 0;

        joystickContainer.addEventListener('touchstart', (e) => {
          joystickActive = true;
          const rect = joystickContainer.getBoundingClientRect();
          joystickStartX = rect.left + rect.width / 2;
          joystickStartY = rect.top + rect.height / 2;
        });

        document.addEventListener('touchmove', (e) => {
          if (!joystickActive) return;
          const touch = e.touches[0];
          const dx = touch.clientX - joystickStartX;
          const dy = touch.clientY - joystickStartY;
          const distance = Math.hypot(dx, dy);
          const maxDistance = 50;
          let x = dx;
          let y = dy;
          if (distance > maxDistance) {
            const angle = Math.atan2(dy, dx);
            x = Math.cos(angle) * maxDistance;
            y = Math.sin(angle) * maxDistance;
          }
          joystickKnob.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
          const normalizedX = x / maxDistance;
          const normalizedY = y / maxDistance;
          this.input.setMobileJoystick(normalizedX, normalizedY);
        });

        document.addEventListener('touchend', (e) => {
          if (!joystickActive) return;
          joystickActive = false;
          joystickKnob.style.transform = 'translate(-50%, -50%)';
          this.input.setMobileJoystick(0, 0);
        });

        container.appendChild(joystickContainer);

        // Action buttons
        const buttonsContainer = document.createElement('div');
        buttonsContainer.style.cssText = `
          position: absolute; right: 12px; bottom: 12px;
          display: flex; flex-direction: column; gap: 8px; pointer-events: auto; z-index: 31;
        `;

        const buttons = [
          { label: '攻撃', key: 'attack', color: '#d96b6b', size: 60 },
          { label: 'ジャンプ', key: 'jump', color: '#7bd98b', size: 54 },
          { label: 'ダッシュ', key: 'dash', color: '#c79b4a', size: 50 },
          { label: 'スキル', key: 'skill', color: '#6b9ad9', size: 50 },
        ];

        buttons.forEach((btn) => {
          const button = document.createElement('button');
          button.innerHTML = btn.label;
          button.style.cssText = `
            width: ${btn.size}px; height: ${btn.size}px; border-radius: 50%;
            background: ${btn.color}dd; border: 2px solid rgba(255, 255, 255, 0.3);
            color: #0a0d12; font-weight: bold; font-size: 11px; cursor: pointer;
            transition: all 0.08s; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 0; font-family: inherit;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
          `;

          button.addEventListener('touchstart', (e) => {
            e.preventDefault();
            button.style.transform = 'scale(0.85)';
            this.input.press(btn.key);
          });

          button.addEventListener('touchend', (e) => {
            e.preventDefault();
            button.style.transform = 'scale(1)';
          });

          buttonsContainer.appendChild(button);
        });

        container.appendChild(buttonsContainer);

        // Form wheel
        const wheelContainer = document.createElement('div');
        wheelContainer.style.cssText = `
          position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
          display: flex; gap: 6px; pointer-events: auto; z-index: 31;
          flex-wrap: wrap; justify-content: center; max-width: 80%;
        `;

        const forms = [
          { emoji: '🐭', id: 0 },
          { emoji: '🦊', id: 1 },
          { emoji: '🐍', id: 2 },
          { emoji: '🦅', id: 3 },
          { emoji: '🐺', id: 4 },
        ];

        forms.forEach((form) => {
          const chip = document.createElement('button');
          chip.innerHTML = form.emoji;
          chip.style.cssText = `
            width: 44px; height: 44px; border-radius: 12px;
            background: rgba(10, 15, 20, 0.8); border: 1px solid rgba(42, 58, 48, 0.8);
            font-size: 22px; cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; justify-content: center;
            padding: 0; opacity: 0.6; backdrop-filter: blur(4px);
          `;

          chip.addEventListener('touchstart', (e) => {
            e.preventDefault();
            chip.style.opacity = '1';
            chip.style.transform = 'scale(1.1)';
            chip.style.borderColor = '#c79b4a';
            chip.style.boxShadow = '0 0 12px rgba(199, 155, 74, 0.6)';
            this.input.press(`form_${form.id}`);
          });

          chip.addEventListener('touchend', (e) => {
            e.preventDefault();
            chip.style.opacity = '0.6';
            chip.style.transform = 'scale(1)';
            chip.style.borderColor = 'rgba(42, 58, 48, 0.8)';
            chip.style.boxShadow = 'none';
          });

          wheelContainer.appendChild(chip);
        });

        container.appendChild(wheelContainer);
        document.body.appendChild(container);
      }
    }

    // ========== MAIN GAME INITIALIZATION ==========
    const loader = document.getElementById('loader');
    const title = document.getElementById('title');
    const startBtn = document.getElementById('startBtn');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const victoryScreen = document.getElementById('victoryScreen');
    const pauseScreen = document.getElementById('pauseScreen');

    startBtn.addEventListener('click', () => {
      title.classList.add('hidden');
      loader.classList.add('hidden');
    });

    setTimeout(() => { loader.classList.add('hidden'); }, 2000);

    const gameContainer = document.getElementById('game');
    const engine = new GameEngine(gameContainer);
    const input = new InputManager(engine.detectMobile());
    engine.input = input;

    if (engine.detectMobile()) {
      new MobileControls(input, engine);
    }

    const particles = new ParticleSystem(engine.getScene());

    const worldBuilder = new WorldBuilder(engine);
    worldBuilder.buildStage(0);

    const player = new Player(engine, { x: 0, y: 5, z: 0 });
    engine.player = player;

    const hud = new HUDSystem(engine);

    let gameState = 'playing';
    let waveNumber = 0;

    engine.onUpdate((dt) => {
      input.update();
      hud.update(player);
      particles.update(dt);

      if (gameState === 'playing') {
        const enemies = engine.getEnemies();
        if (enemies.length === 0 && waveNumber < 3) {
          waveNumber++;
          if (waveNumber < 3) {
            worldBuilder.buildStage(waveNumber);
          } else {
            gameState = 'victory';
            engine.setState('victory');
          }
        }

        if (player.hp <= 0) {
          gameState = 'gameOver';
          engine.setState('gameOver');
        }
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
        if (gameState === 'playing') {
          gameState = 'paused';
          engine.setState('paused');
        } else if (gameState === 'paused') {
          gameState = 'playing';
          engine.setState('playing');
        }
      }
      if (e.key === 'u' || e.key === 'U') {
        player.unlockForm('mouse');
        player.unlockForm('fox');
        player.unlockForm('snake');
        player.unlockForm('eagle');
        player.unlockForm('wolf');
      }
      if (e.key === 'd' || e.key === 'D') {
        const difficulties = ['easy', 'normal', 'hard', 'insane'];
        const currentIndex = difficulties.indexOf(GAME_BALANCE.currentDifficulty);
        const nextDifficulty = difficulties[(currentIndex + 1) % difficulties.length];
        GAME_BALANCE.setDifficulty(nextDifficulty);
      }
    });

    window.addEventListener('engine:statechange', (e) => {
      const { newState } = e.detail;
      if (newState === 'gameOver') {
        gameOverScreen.classList.add('show');
      } else if (newState === 'victory') {
        victoryScreen.classList.add('show');
      } else if (newState === 'paused') {
        pauseScreen.classList.add('show');
      } else if (newState === 'playing') {
        gameOverScreen.classList.remove('show');
        victoryScreen.classList.remove('show');
        pauseScreen.classList.remove('show');
      }
    });

    engine.setState('playing');
    engine.start();

    console.log('Inverse Hunter Complete Edition started');
  </script>
